name: "Build Device Firmware with Nix"
description: "Builds ESP32-C3 firmware using deterministic Nix environment"
inputs:
  board:
    description: "Board variant to build"
    required: true
    default: "v2"
outputs:
  firmware-hash:
    description: "SHA256 hash of the built firmware"
    value: ${{ steps.build.outputs.firmware-hash }}
runs:
  using: "composite"
  steps:
    - name: Build and debug with Nix environment
      shell: bash
      run: |
        nix develop --command bash -c "
          echo '🔍 Nix Environment Check:'
          echo 'SOURCE_DATE_EPOCH: \${SOURCE_DATE_EPOCH:-NOT SET}'
          echo 'CARGO_BUILD_INCREMENTAL: \${CARGO_BUILD_INCREMENTAL:-NOT SET}'
          
          echo '🔨 Building with Nix environment...'
          cd device && just build-device ${{ inputs.board }} --locked

          just save-image ${{ inputs.board }}

          echo '🔍 Running debug analysis...'
          ./debug-build-differences.sh
        "
