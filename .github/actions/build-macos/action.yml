name: "Build macOS App"
description: "Builds macOS app"

inputs:
  firmware_path:
    description: "Path to signed firmware binary"
    required: true
  env:
    description: "Environment (dev or prod) — determines genuine cert key and firmware path"
    default: "dev"

runs:
  using: "composite"
  steps:
    - uses: "./.github/actions/set-up-app-build"
      with:
        firmware_path: ${{ inputs.firmware_path }}
        env: ${{ inputs.env }}
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin,x86_64-apple-darwin
    - uses: "./.github/actions/cache-rust-target"
      with:
        key: "app-build-macos-v0"
        path: |
          target/aarch64-apple-darwin/release
          target/x86_64-apple-darwin/release
    - name: Install CocoaPods
      shell: bash
      run: gem install cocoapods
    - name: Build macOS App
      shell: bash
      run: just env=${{ inputs.env }} build macos --release
    - name: Verify cargokit lockfile not drifted during build
      shell: bash
      run: git diff --exit-code frostsnapp/rust_builder/cargokit/build_tool/pubspec.lock
