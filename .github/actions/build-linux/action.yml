name: "Build Linux App"
description: "Builds Linux app bundle"

inputs:
  firmware_path:
    description: "Path to signed firmware binary"
    required: true
  env:
    description: "Environment (dev or prod) — determines genuine cert key and firmware path"
    default: "dev"

runs:
  using: "composite"
  steps:
    - uses: "./.github/actions/set-up-app-build"
      with:
        firmware_path: ${{ inputs.firmware_path }}
        env: ${{ inputs.env }}
    - uses: "./.github/actions/cache-rust-target"
      with:
        key: "app-build-linux-v0"
    - name: APT install dependencies for linux
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build libstdc++-12-dev libgtk-3-0 libgtk-3-dev cmake clang
    - name: Build App Linux
      shell: bash
      run: just env=${{ inputs.env }} build linux --release
    - name: Verify no checked-out files drifted during build
      shell: bash
      run: git diff --exit-code
