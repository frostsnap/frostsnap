name: "Build Android App"
description: "Builds Android APK and App Bundle"

inputs:
  firmware_path:
    description: "Path to signed firmware binary"
    required: true
  env:
    description: "Environment (dev or prod) — determines genuine cert key and firmware path"
    default: "dev"

runs:
  using: "composite"
  steps:
    - uses: "./.github/actions/free-disk-space"
    - uses: "./.github/actions/set-up-app-build"
      with:
        firmware_path: ${{ inputs.firmware_path }}
        env: ${{ inputs.env }}
    - uses: "./.github/actions/cache-rust-target"
      with:
        key: "android-app-v0"
        path: |
          target/aarch64-linux-android/release
          target/armv7-linux-androideabi/release
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi
    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 17
        cache: gradle
    - name: Install android
      uses: android-actions/setup-android@v3
    - name: Install NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        link-to-sdk: true
        add-to-path: true
    - name: Restore release signing keystore
      if: env.ANDROID_KEYSTORE != ''
      shell: bash
      run: |
        mkdir -p "$HOME/.android"
        echo "$ANDROID_KEYSTORE" | base64 -d > "$HOME/.android/debug.keystore"
    - name: Build App APK
      shell: bash
      run: just env=${{ inputs.env }} build apk --release --flavor direct
    - name: Build appbundle
      shell: bash
      run: just env=${{ inputs.env }} build appbundle --release --flavor playstore
