name: "Build Windows App"
description: "Builds Windows app"

inputs:
  firmware_path:
    description: "Path to signed firmware binary"
    required: true
  env:
    description: "Environment (dev or prod) — determines genuine cert key and firmware path"
    default: "dev"

runs:
  using: "composite"
  steps:
    - uses: "./.github/actions/set-up-app-build"
      with:
        firmware_path: ${{ inputs.firmware_path }}
        env: ${{ inputs.env }}
    - uses: dtolnay/rust-toolchain@stable
    - uses: "./.github/actions/cache-rust-target"
      with:
        key: "app-build-windows-v0"
    - name: Build App Windows
      shell: bash
      run: just env=${{ inputs.env }} build windows --release
    - name: Verify no checked-out files drifted during build
      shell: bash
      run: git diff --exit-code
