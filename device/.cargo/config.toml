[target.riscv32imc-unknown-none-elf]
# "just legacy-flash" uses this cargo runner to flash non-secure boot devices.
# The default espflash bootloader won't work because we changed the partition table offset
# to accommodate the larger secure boot enabled bootloader.
runner = "espflash flash --baud 921600 --partition-table partitions.csv --bootloader bootloader-legacy.bin"

[target.xtensa-esp32s3-none-elf]
# For S3 dev bring-up we use espflash's bundled bootloader with default partition
# table offset (0x8000) and a dedicated partition map.
runner = "espflash flash --baud 921600 --partition-table partitions-esp32s3.csv"

[build]
rustflags = ["-C", "link-arg=-Tlinkall.x"]

[env]
ESP_BOOTLOADER_ESP_IDF_CONFIG_PARTITION_TABLE_OFFSET = "0xD000"
CC_xtensa_esp32s3_none_elf = "xtensa-esp32s3-elf-gcc"
AR_xtensa_esp32s3_none_elf = "xtensa-esp32s3-elf-ar"

[profile.release]
debug = 0
strip = "symbols"
panic = "abort"

[unstable]
build-std = ["alloc", "core"]
